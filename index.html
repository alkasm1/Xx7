<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إرسال الصور عبر QR (نسخة مضغوطة)</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f5f5f5;
}
button {
  padding: 10px;
  margin: 10px;
}
.qr {
  margin: 10px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>

</head>

<body>

<h2>إرسال صورة عبر QR (مضغوط)</h2>

<input type="file" id="imageInput">
<button onclick="encodeImage()">تحويل إلى QR</button>

<div id="qrContainer"></div>

<hr>

<h3>استقبال</h3>
<input type="file" id="qrImageInput" multiple>
<button onclick="decodeMultipleQR()">فك QR</button>

<div id="outputImage"></div>

<script>
let receivedParts = {};
let totalParts = 0;

/* =========================
   1) معالجة الصورة (تصغير + ضغط)
========================= */
async function preprocessImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");

      const maxSize = 400;
      let w = img.width;
      let h = img.height;

      if (w > h && w > maxSize) {
        h *= maxSize / w;
        w = maxSize;
      } else if (h > maxSize) {
        w *= maxSize / h;
        h = maxSize;
      }

      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext("2d");

      // Grayscale
      ctx.filter = "grayscale(100%)";
      ctx.drawImage(img, 0, 0, w, h);

      // ضغط (جرب webp لو تريد أفضل)
      const dataUrl = canvas.toDataURL("image/jpeg", 0.5);

      resolve(dataUrl);
    };

    img.src = URL.createObjectURL(file);
  });
}

/* =========================
   2) توليد QR
========================= */
async function encodeImage() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) return alert("اختر صورة");

  const processed = await preprocessImage(file);

  const base64 = processed.split(",")[1];

  // تحويل إلى binary
  const binary = Uint8Array.from(atob(base64), c => c.charCodeAt(0));

  // ضغط
  const compressed = pako.deflate(binary);

  // إلى Base64
  const compressedBase64 = btoa(
    String.fromCharCode(...compressed)
  );

  // تقسيم
  const chunkSize = 800;
  const chunks = [];

  for (let i = 0; i < compressedBase64.length; i += chunkSize) {
    chunks.push(compressedBase64.slice(i, i + chunkSize));
  }

  const container = document.getElementById("qrContainer");
  container.innerHTML = "";

  chunks.forEach((chunk, i) => {
    const payload = `IMG:${i+1}/${chunks.length}|${chunk}`;

    const div = document.createElement("div");
    div.className = "qr";

    new QRCode(div, {
      text: payload,
      width: 220,
      height: 220
    });

    container.appendChild(div);
  });

  alert("عدد الباركودات: " + chunks.length);
}

/* =========================
   3) قراءة QR
========================= */
async function decodeMultipleQR() {
  const files = document.getElementById("qrImageInput").files;

  for (const file of files) {
    const img = await loadImage(file);
    const payload = scanQR(img);

    if (payload) handleQR(payload);
  }
}

function loadImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = URL.createObjectURL(file);
  });
}

function scanQR(img) {
  const canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(data.data, canvas.width, canvas.height);

  return code ? code.data : null;
}

/* =========================
   4) تجميع الأجزاء
========================= */
function handleQR(payload) {
  if (!payload.startsWith("IMG:")) return;

  const [info, data] = payload.split("|");
  const [index, total] = info.replace("IMG:", "").split("/");

  receivedParts[parseInt(index)] = data;
  totalParts = parseInt(total);

  if (Object.keys(receivedParts).length === totalParts) {
    rebuildImage();
  }
}

/* =========================
   5) فك الضغط واستعادة الصورة
========================= */
function rebuildImage() {
  let full = "";

  for (let i = 1; i <= totalParts; i++) {
    full += receivedParts[i];
  }

  try {
    const compressed = Uint8Array.from(atob(full), c => c.charCodeAt(0));

    const decompressed = pako.inflate(compressed);

    let binary = "";
    decompressed.forEach(b => binary += String.fromCharCode(b));

    const finalBase64 = btoa(binary);

    const img = new Image();
    img.src = "data:image/jpeg;base64," + finalBase64;

    const out = document.getElementById("outputImage");
    out.innerHTML = "";
    out.appendChild(img);

  } catch (e) {
    alert("فشل فك الضغط");
  }

  receivedParts = {};
  totalParts = 0;
}
</script>

</body>
</html>
