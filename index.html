<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام إرسال الصور عبر باركودات متعددة</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  margin: 0;
  padding: 0;
  color: #222;
}

header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}

button:hover {
  background: #0a8c6c;
}

textarea, input[type="file"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}

.qr-item {
  margin-bottom: 25px;
  text-align: center;
}

.qr-buttons {
  margin-top: 8px;
  display: flex;
  gap: 10px;
}

.qr-buttons button {
  flex: 1;
  padding: 10px;
  font-size: 15px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<header>نظام إرسال الصور عبر باركودات متعددة</header>

<div class="container">

  <h3>1) إرسال صورة</h3>
  <input type="file" id="imageInput" accept="image/*">
  <button onclick="encodeImage()">تحويل الصورة إلى باركودات</button>

  <div id="qrContainer"></div>

  <hr>

  <h3>2) استقبال الصورة</h3>

  <button onclick="startScan()">مسح باركود بالكاميرا</button>

  <input type="file" id="qrImageInput" accept="image/*">
  <button onclick="decodeFromQRImage()">فكّ باركود من صورة في المعرض</button>

  <div id="reader" style="width:300px; margin:15px auto; display:none;"></div>

  <h4>الأجزاء المستلمة:</h4>
  <div id="partsStatus"></div>

  <h4>الصورة المستعادة:</h4>
  <div id="outputImage" style="margin-top:20px; text-align:center;"></div>

</div>

<script>
let receivedParts = {};
let totalParts = 0;
let receivedMime = null;

/* تحويل ملف إلى Base64 مع حفظ نوعه */
function fileToBase64WithMime(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      const [meta, data] = result.split(",");
      const mime = meta.match(/data:(.*);base64/)[1];
      resolve({ mime, data });
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* توليد باركودات متعددة للصورة */
async function encodeImage() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) {
    alert("اختر صورة أولاً.");
    return;
  }

  const { mime, data: base64 } = await fileToBase64WithMime(file);

  const chunkSize = 800;
  const chunks = [];
  for (let i = 0; i < base64.length; i += chunkSize) {
    chunks.push(base64.slice(i, i + chunkSize));
  }

  const qrContainer = document.getElementById("qrContainer");
  qrContainer.innerHTML = "";

  chunks.forEach((chunk, index) => {
    const payload = `IMG:${index+1}/${chunks.length}:${mime}|${chunk}`;

    const div = document.createElement("div");
    div.className = "qr-item";

    const label = document.createElement("div");
    label.textContent = `الجزء ${index+1} من ${chunks.length}`;

    const qrDiv = document.createElement("div");
    new QRCode(qrDiv, {
      text: payload,
      width: 260,
      height: 260,
      correctLevel: QRCode.CorrectLevel.M
    });

    const btns = document.createElement("div");
    btns.className = "qr-buttons";

    const saveBtn = document.createElement("button");
    saveBtn.textContent = "حفظ";
    saveBtn.onclick = () => saveQR(qrDiv);

    const shareBtn = document.createElement("button");
    shareBtn.textContent = "مشاركة";
    shareBtn.onclick = () => shareQR(qrDiv);

    btns.appendChild(saveBtn);
    btns.appendChild(shareBtn);

    div.appendChild(label);
    div.appendChild(qrDiv);
    div.appendChild(btns);

    qrContainer.appendChild(div);
  });

  alert("تم توليد باركودات الصورة بنجاح.");
}

/* حفظ QR */
function saveQR(qrDiv) {
  const img = qrDiv.querySelector("img");
  const canvas = qrDiv.querySelector("canvas");
  let url = null;

  if (img) url = img.src;
  else if (canvas) url = canvas.toDataURL("image/png");

  const a = document.createElement("a");
  a.href = url;
  a.download = "qr.png";
  a.click();
}

/* مشاركة QR */
async function shareQR(qrDiv) {
  const img = qrDiv.querySelector("img");
  const canvas = qrDiv.querySelector("canvas");
  let url = null;

  if (img) url = img.src;
  else if (canvas) url = canvas.toDataURL("image/png");

  const blob = await (await fetch(url)).blob();
  const file = new File([blob], "qr.png", { type: "image/png" });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: "QR" });
  } else {
    alert("المشاركة غير مدعومة.");
  }
}

/* معالجة باركود مستلم */
function handleQRPayload(payload) {
  if (!payload.startsWith("IMG:")) {
    alert("هذا الباركود لا ينتمي للصورة.");
    return;
  }

  const [header, body] = payload.split("|");
  const [partInfo, mime] = header.replace("IMG:", "").split(":");
  const [currentStr, totalStr] = partInfo.split("/");

  const current = parseInt(currentStr);
  const total = parseInt(totalStr);

  if (!totalParts) totalParts = total;
  if (!receivedMime) receivedMime = mime;

  receivedParts[current] = body;

  updatePartsStatus();

  if (Object.keys(receivedParts).length === totalParts) {
    rebuildImage();
  }
}

/* تحديث حالة الأجزاء */
function updatePartsStatus() {
  if (!totalParts) {
    document.getElementById("partsStatus").textContent = "لم يتم استقبال أي جزء.";
    return;
  }

  const count = Object.keys(receivedParts).length;
  document.getElementById("partsStatus").textContent =
    `تم استقبال ${count} من ${totalParts} جزءًا.`;
}

/* إعادة بناء الصورة */
function rebuildImage() {
  let fullBase64 = "";
  for (let i = 1; i <= totalParts; i++) {
    if (!receivedParts[i]) {
      alert("هناك جزء مفقود.");
      return;
    }
    fullBase64 += receivedParts[i];
  }

  const img = new Image();
  img.src = `data:${receivedMime};base64,` + fullBase64;

  const out = document.getElementById("outputImage");
  out.innerHTML = "";
  out.appendChild(img);

  document.getElementById("partsStatus").textContent = "تم استعادة الصورة بنجاح.";

  receivedParts = {};
  totalParts = 0;
  receivedMime = null;
}

/* مسح باركود بالكاميرا */
let html5Qr = null;

function startScan() {
  const reader = document.getElementById("reader");
  reader.style.display = "block";

  if (html5Qr) {
    html5Qr.stop().catch(()=>{}).finally(()=> {
      html5Qr.clear();
      html5Qr = null;
      startScan();
    });
    return;
  }

  html5Qr = new Html5Qrcode("reader");

  html5Qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    qrText => handleQRPayload(qrText)
  );
}

/* فكّ باركود من صورة في المعرض */
async function decodeFromQRImage() {
  const file = document.getElementById("qrImageInput").files[0];
  if (!file) {
    alert("اختر صورة باركود أولاً.");
    return;
  }

  const tempId = "reader-temp";
  let tempDiv = document.getElementById(tempId);
  if (!tempDiv) {
    tempDiv = document.createElement("div");
    tempDiv.id = tempId;
    tempDiv.style.display = "none";
    document.body.appendChild(tempDiv);
  }

  const localQr = new Html5Qrcode(tempId);

  try {
    const result = await localQr.scanFile(file, true);
    handleQRPayload(result);
  } catch (e) {
    alert("فشل في قراءة الباركود.");
  } finally {
    localQr.clear();
  }
}
</script>

</body>
</html>
