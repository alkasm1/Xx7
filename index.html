<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام إرسال الصور عبر شرائح باركود متعددة</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  margin: 0;
  padding: 0;
  color: #222;
}

header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}

button:hover {
  background: #0a8c6c;
}

input[type="file"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}

.qr-item {
  margin-bottom: 25px;
  text-align: center;
}

.qr-buttons {
  margin-top: 8px;
  display: flex;
  gap: 10px;
}

.qr-buttons button {
  flex: 1;
  padding: 10px;
  font-size: 15px;
}

.slice {
  width: 100%;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

</head>

<body>

<header>نظام إرسال الصور عبر شرائح باركود متعددة</header>

<div class="container">

  <h3>1) إرسال صورة</h3>
  <input type="file" id="imageInput" accept="image/*">
  <button onclick="encodeImage()">تحويل الصورة إلى شرائح باركود</button>

  <div id="qrContainer"></div>

  <hr>

  <h3>2) استقبال الصورة</h3>

  <input type="file" id="qrImageInput" accept="image/*" multiple>
  <button onclick="decodeMultipleQR()">فكّ عدة باركودات من المعرض</button>

  <h4>الأجزاء المستلمة:</h4>
  <div id="partsStatus"></div>

  <h4>الصورة المستعادة:</h4>
  <div id="outputImage" style="margin-top:20px; text-align:center;"></div>

</div>

<script>

let receivedSlices = {};
let totalSlices = 0;

/* تحميل صورة */
function loadImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = URL.createObjectURL(file);
  });
}

/* تقسيم الصورة إلى شرائح أفقية */
function sliceImage(img, sliceHeight = 40) {
  const slices = [];
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;

  for (let y = 0; y < img.height; y += sliceHeight) {
    const h = Math.min(sliceHeight, img.height - y);
    canvas.height = h;

    ctx.drawImage(img, 0, y, img.width, h, 0, 0, img.width, h);

    const base64 = canvas.toDataURL("image/png").split(",")[1];
    slices.push(base64);
  }

  return slices;
}

/* توليد باركودات لكل شريحة */
async function encodeImage() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) {
    alert("اختر صورة أولاً.");
    return;
  }

  const img = await loadImage(file);
  const slices = sliceImage(img);

  const qrContainer = document.getElementById("qrContainer");
  qrContainer.innerHTML = "";

  slices.forEach((slice, index) => {
    const payload = `SLICE:${index+1}/${slices.length}|${slice}`;

    const div = document.createElement("div");
    div.className = "qr-item";

    const label = document.createElement("div");
    label.textContent = `الشريحة ${index+1} من ${slices.length}`;

    const qrDiv = document.createElement("div");

    new QRCode(qrDiv, {
      text: payload,
      width: 260,
      height: 260,
      correctLevel: QRCode.CorrectLevel.M
    });

    div.appendChild(label);
    div.appendChild(qrDiv);

    qrContainer.appendChild(div);
  });

  alert("تم توليد شرائح الباركود بنجاح.");
}

/* قراءة QR من صورة باستخدام jsQR */
function scanQRFromImage(img) {
  const canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, canvas.width, canvas.height);

  return code ? code.data : null;
}

/* فك عدة باركودات */
async function decodeMultipleQR() {
  const files = document.getElementById("qrImageInput").files;
  if (!files.length) {
    alert("اختر صور باركود أولاً.");
    return;
  }

  for (const file of files) {
    const img = await loadImage(file);
    const payload = scanQRFromImage(img);

    if (payload && payload.startsWith("SLICE:")) {
      handleSlice(payload);
    }
  }

  rebuildImage();
}

/* معالجة شريحة مستلمة */
function handleSlice(payload) {
  const [header, body] = payload.split("|");
  const [indexInfo] = header.replace("SLICE:", "").split("/");
  const index = parseInt(indexInfo);
  const total = parseInt(header.split("/")[1]);

  if (!totalSlices) totalSlices = total;

  receivedSlices[index] = body;

  updatePartsStatus();
}

/* تحديث حالة الأجزاء */
function updatePartsStatus() {
  const count = Object.keys(receivedSlices).length;
  document.getElementById("partsStatus").textContent =
    `تم استقبال ${count} من ${totalSlices} شريحة.`;
}

/* إعادة بناء الصورة من الشرائح */
function rebuildImage() {
  const container = document.getElementById("outputImage");
  container.innerHTML = "";

  const keys = Object.keys(receivedSlices).map(n => parseInt(n)).sort((a,b)=>a-b);

  keys.forEach(k => {
    const img = new Image();
    img.src = "data:image/png;base64," + receivedSlices[k];
    img.className = "slice";
    container.appendChild(img);
  });
}

</script>

</body>
</html>
