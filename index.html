<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام إرسال الصور عبر QR (نسخة محسنة)</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  margin: 0;
  padding: 0;
  color: #222;
}

header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}

.qr-item {
  margin-bottom: 25px;
  text-align: center;
}

.qr-buttons {
  margin-top: 8px;
  display: flex;
  gap: 10px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>

</head>

<body>

<header>إرسال الصور عبر QR (مضغوط)</header>

<div class="container">

<h3>إرسال صورة</h3>
<input type="file" id="imageInput">
<button onclick="encodeImage()">تحويل إلى باركود</button>

<div id="qrContainer"></div>

<hr>

<h3>استقبال</h3>
<input type="file" id="qrImageInput" multiple>
<button onclick="decodeMultipleQR()">فك الباركود</button>

<div id="outputImage"></div>

</div>

<script>

let receivedParts = {};
let totalParts = 0;

/* =========================
   تحويل Uint8 إلى String
========================= */
function uint8ToString(u8) {
  let s = "";
  for (let i = 0; i < u8.length; i++) {
    s += String.fromCharCode(u8[i]);
  }
  return s;
}

/* =========================
   معالجة الصورة (تصغير + ضغط)
========================= */
async function preprocessImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {

      const canvas = document.createElement("canvas");

      const maxSize = 400;
      let w = img.width;
      let h = img.height;

      if (w > h && w > maxSize) {
        h *= maxSize / w;
        w = maxSize;
      } else if (h > maxSize) {
        w *= maxSize / h;
        h = maxSize;
      }

      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext("2d");

      ctx.filter = "grayscale(100%)";
      ctx.drawImage(img, 0, 0, w, h);

      const dataUrl = canvas.toDataURL("image/jpeg", 0.5);

      resolve(dataUrl);
    };

    img.src = URL.createObjectURL(file);
  });
}

/* =========================
   توليد QR
========================= */
async function encodeImage() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) return alert("اختر صورة");

  const processed = await preprocessImage(file);
  const base64 = processed.split(",")[1];

  const binary = Uint8Array.from(atob(base64), c => c.charCodeAt(0));

  const compressed = pako.deflate(binary);

  // بدون Base64
  const compressedString = uint8ToString(compressed);

  const chunkSize = 1500;
  const chunks = [];

  for (let i = 0; i < compressedString.length; i += chunkSize) {
    chunks.push(compressedString.slice(i, i + chunkSize));
  }

  const container = document.getElementById("qrContainer");
  container.innerHTML = "";

  chunks.forEach((chunk, i) => {

    const payload = `IMG:${i+1}/${chunks.length}|${chunk}`;

    const div = document.createElement("div");
    div.className = "qr-item";

    const label = document.createElement("div");
    label.textContent = `جزء ${i+1} / ${chunks.length}`;

    const qrDiv = document.createElement("div");

    new QRCode(qrDiv, {
      text: payload,
      width: 260,
      height: 260,
      correctLevel: QRCode.CorrectLevel.L
    });

    const btns = document.createElement("div");
    btns.className = "qr-buttons";

    const saveBtn = document.createElement("button");
    saveBtn.textContent = "حفظ";
    saveBtn.onclick = () => saveQR(payload);

    const shareBtn = document.createElement("button");
    shareBtn.textContent = "مشاركة";
    shareBtn.onclick = () => shareQR(payload);

    btns.appendChild(saveBtn);
    btns.appendChild(shareBtn);

    div.appendChild(label);
    div.appendChild(qrDiv);
    div.appendChild(btns);

    container.appendChild(div);
  });

  alert("عدد الباركودات: " + chunks.length);
}

/* =========================
   حفظ QR
========================= */
function saveQR(payload) {
  const div = document.createElement("div");
  new QRCode(div, { text: payload, width: 260, height: 260 });

  const canvas = div.querySelector("canvas");
  const url = canvas.toDataURL();

  const a = document.createElement("a");
  a.href = url;
  a.download = "qr.png";
  a.click();
}

/* =========================
   مشاركة QR
========================= */
async function shareQR(payload) {
  const div = document.createElement("div");
  new QRCode(div, { text: payload, width: 260, height: 260 });

  const canvas = div.querySelector("canvas");
  const blob = await (await fetch(canvas.toDataURL())).blob();

  const file = new File([blob], "qr.png");

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file] });
  } else {
    alert("المشاركة غير مدعومة");
  }
}

/* =========================
   قراءة QR
========================= */
async function decodeMultipleQR() {
  const files = document.getElementById("qrImageInput").files;

  for (const file of files) {
    const img = await loadImage(file);
    const payload = scanQR(img);
    if (payload) handleQR(payload);
  }
}

function loadImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = URL.createObjectURL(file);
  });
}

function scanQR(img) {
  const canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(data.data, canvas.width, canvas.height);

  return code ? code.data : null;
}

/* =========================
   تجميع البيانات
========================= */
function handleQR(payload) {
  if (!payload.startsWith("IMG:")) return;

  const [info, data] = payload.split("|");
  const [index, total] = info.replace("IMG:", "").split("/");

  receivedParts[parseInt(index)] = data;
  totalParts = parseInt(total);

  if (Object.keys(receivedParts).length === totalParts) {
    rebuildImage();
  }
}

/* =========================
   إعادة بناء الصورة
========================= */
function rebuildImage() {

  let full = "";

  for (let i = 1; i <= totalParts; i++) {
    full += receivedParts[i];
  }

  try {
    const compressed = new Uint8Array(full.split("").map(c => c.charCodeAt(0)));

    const decompressed = pako.inflate(compressed);

    let binary = "";
    decompressed.forEach(b => binary += String.fromCharCode(b));

    const finalBase64 = btoa(binary);

    const img = new Image();
    img.src = "data:image/jpeg;base64," + finalBase64;

    const out = document.getElementById("outputImage");
    out.innerHTML = "";
    out.appendChild(img);

  } catch (e) {
    alert("فشل فك الضغط");
  }

  receivedParts = {};
  totalParts = 0;
}

</script>

</body>
</html>
