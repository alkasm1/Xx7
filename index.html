<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام إرسال الصور عبر باركودات متعددة</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  margin: 0;
  padding: 0;
  color: #222;
}

header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
  max-width: 650px;
  margin: auto;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}

button:hover {
  background: #0a8c6c;
}

input[type="file"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}

.qr-item {
  margin-bottom: 25px;
  text-align: center;
}

.qr-buttons {
  margin-top: 8px;
  display: flex;
  gap: 10px;
}

.qr-buttons button {
  flex: 1;
  padding: 10px;
  font-size: 15px;
}

#cameraView {
  width: 300px;
  height: 300px;
  background: #000;
  margin: 15px auto;
  display: none;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

</head>

<body>

<header>نظام إرسال الصور عبر باركودات متعددة</header>

<div class="container">

  <h3>1) إرسال صورة</h3>
  <input type="file" id="imageInput" accept="image/*">
  <button onclick="encodeImage()">تحويل الصورة إلى باركودات</button>

  <div id="qrContainer"></div>

  <hr>

  <h3>2) استقبال الصورة</h3>

  <button onclick="toggleCamera()">مسح باركود بالكاميرا</button>
  <video id="cameraView" autoplay playsinline></video>

  <input type="file" id="qrImageInput" accept="image/*" multiple>
  <button onclick="decodeMultipleQR()">فكّ عدة باركودات من المعرض</button>

  <h4>الأجزاء المستلمة:</h4>
  <div id="partsStatus"></div>

  <h4>الصورة المستعادة:</h4>
  <div id="outputImage" style="margin-top:20px; text-align:center;"></div>

</div>

<script>
let receivedParts = {};
let totalParts = 0;
let receivedMime = null;

/* ضغط الصورة إلى JPEG منخفض الجودة (لتقليل عدد QR) */
async function compressToJpegBase64(file, quality = 0.30, maxSide = 700) {
  const img = await new Promise((resolve, reject) => {
    const im = new Image();
    im.onload = () => resolve(im);
    im.onerror = reject;
    im.src = URL.createObjectURL(file);
  });

  const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
  const w = Math.max(1, Math.round(img.width * scale));
  const h = Math.max(1, Math.round(img.height * scale));

  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext("2d");
  // رسم بأقل تكلفة
  ctx.drawImage(img, 0, 0, w, h);

  const dataUrl = canvas.toDataURL("image/jpeg", quality); // data:image/jpeg;base64,...
  const base64 = dataUrl.split(",")[1];
  return { mime: "image/jpeg", data: base64 };
}

/* توليد QR في كانفس مستقل (للحفظ/المشاركة) */
function generateQR(payload) {
  const size = 260;
  const temp = document.createElement("div");
  new QRCode(temp, {
    text: payload,
    width: size,
    height: size,
    correctLevel: QRCode.CorrectLevel.L // أقل تصحيح = أقل حجم/عدد مع قبول القراءة في المعرض
  });

  const canvas = temp.querySelector("canvas");
  const outCanvas = document.createElement("canvas");
  outCanvas.width = size;
  outCanvas.height = size;

  const ctx = outCanvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, size, size);
  ctx.drawImage(canvas, 0, 0);

  return outCanvas.toDataURL("image/png");
}

/* حفظ QR */
function saveQR(payload) {
  const url = generateQR(payload);
  const a = document.createElement("a");
  a.href = url;
  a.download = "qr.png";
  a.click();
}

/* مشاركة QR */
async function shareQR(payload) {
  const url = generateQR(payload);
  const res = await fetch(url);
  const blob = await res.blob();
  const file = new File([blob], "qr.png", { type: "image/png" });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: "QR" });
  } else {
    alert("المشاركة غير مدعومة.");
  }
}

/* تحويل طول payload للتحكم بالـ chunk */
function getPayloadLength(mime, chunk, idx, total) {
  // IMG:idx/total:mime|chunk
  return (`IMG:${idx}/${total}:${mime}|${chunk}`).length;
}

// حد آمن تقريبي (لخفض عدد QR بدون كسر توليد QR)
const SAFE_MAX_QR_TEXT_LEN = 1200;

// تجربة توليد QR للتأكد أنه لا يتسبب بخطأ
function canGenerateQR(text) {
  const temp = document.createElement("div");
  try {
    new QRCode(temp, {
      text,
      width: 1,
      height: 1,
      correctLevel: QRCode.CorrectLevel.L
    });
    return true;
  } catch (e) {
    return false;
  }
}

/* تحويل الصورة إلى باركودات بأقل عدد (ضغط + chunk ديناميكي + correctLevel=L) */
async function encodeImage() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) {
    alert("اختر صورة أولاً.");
    return;
  }

  // 1) ضغط الصورة بقيم منخفضة (لتحقيق أقل عدد QR في المعرض)
  const { mime, data: base64 } = await compressToJpegBase64(file, 0.30, 700);

  const qrContainer = document.getElementById("qrContainer");
  qrContainer.innerHTML = "";

  // 2) Chunk ديناميكي عبر binary search لأكبر chunk ممكن (ضمن حد آمن)
  let low = 50;
  let high = 2000;
  let best = 200;

  while (low <= high) {
    const mid = Math.floor((low + high) / 2);
    const chunksCount = Math.ceil(base64.length / mid);
    const chunk = base64.slice(0, mid);

    const payloadLen = getPayloadLength(mime, chunk, 1, chunksCount);

    const samplePayload = `IMG:1/${chunksCount}:${mime}|${chunk}`;

    if (payloadLen > SAFE_MAX_QR_TEXT_LEN || !canGenerateQR(samplePayload)) {
      high = mid - 1;
    } else {
      best = mid;
      low = mid + 1;
    }
  }

  const chunkSize = best;

  const chunks = [];
  for (let i = 0; i < base64.length; i += chunkSize) {
    chunks.push(base64.slice(i, i + chunkSize));
  }

  // 3) توليد QR
  chunks.forEach((chunk, index) => {
    const total = chunks.length;
    const payload = `IMG:${index + 1}/${total}:${mime}|${chunk}`;

    const div = document.createElement("div");
    div.className = "qr-item";

    const label = document.createElement("div");
    label.textContent = `الجزء ${index + 1} من ${total}`;

    const qrDiv = document.createElement("div");
    new QRCode(qrDiv, {
      text: payload,
      width: 260,
      height: 260,
      correctLevel: QRCode.CorrectLevel.L // أقل تصحيح = عادة أقل حجم/أسرع
    });

    const btns = document.createElement("div");
    btns.className = "qr-buttons";

    const saveBtn = document.createElement("button");
    saveBtn.textContent = "حفظ";
    saveBtn.onclick = () => saveQR(payload);

    const shareBtn = document.createElement("button");
    shareBtn.textContent = "مشاركة";
    shareBtn.onclick = () => shareQR(payload);

    btns.appendChild(saveBtn);
    btns.appendChild(shareBtn);

    div.appendChild(label);
    div.appendChild(qrDiv);
    div.appendChild(btns);

    qrContainer.appendChild(div);
  });

  alert(`تم توليد باركودات الصورة بنجاح.\nعدد الأجزاء: ${chunks.length}\nchunkSize: ${chunkSize}`);
}

/* معالجة باركود مستلم */
function handleQRPayload(payload) {
  if (!payload || !payload.startsWith("IMG:")) {
    alert("هذا الباركود لا ينتمي للصورة.");
    return;
  }

  const [header, body] = payload.split("|");
  const [partInfo, mime] = header.replace("IMG:", "").split(":");
  const [currentStr, totalStr] = partInfo.split("/");

  const current = parseInt(currentStr, 10);
  const total = parseInt(totalStr, 10);

  if (!totalParts) totalParts = total;
  if (!receivedMime) receivedMime = mime;

  receivedParts[current] = body;

  updatePartsStatus();

  if (Object.keys(receivedParts).length === totalParts) {
    rebuildImage();
  }
}

/* تحديث حالة الأجزاء */
function updatePartsStatus() {
  if (!totalParts) {
    document.getElementById("partsStatus").textContent = "لم يتم استقبال أي جزء.";
    return;
  }

  const count = Object.keys(receivedParts).length;
  document.getElementById("partsStatus").textContent =
    `تم استقبال ${count} من ${totalParts} جزءًا.`;
}

/* إعادة بناء الصورة */
function rebuildImage() {
  let fullBase64 = "";
  for (let i = 1; i <= totalParts; i++) {
    if (!receivedParts[i]) {
      alert("هناك جزء مفقود.");
      return;
    }
    fullBase64 += receivedParts[i];
  }

  const img = new Image();
  img.src = `data:${receivedMime};base64,` + fullBase64;

  const out = document.getElementById("outputImage");
  out.innerHTML = "";
  out.appendChild(img);

  document.getElementById("partsStatus").textContent = "تم استعادة الصورة بنجاح.";

  receivedParts = {};
  totalParts = 0;
  receivedMime = null;
}

/* قراءة عدة باركودات من المعرض */
async function decodeMultipleQR() {
  const files = document.getElementById("qrImageInput").files;
  if (!files.length) {
    alert("اختر صور باركود أولاً.");
    return;
  }

  for (const file of files) {
    const img = await loadImage(file);
    const payload = scanQRFromImage(img);
    if (payload) {
      handleQRPayload(payload);
    } else {
      alert("فشل قراءة أحد الباركودات، تأكد من وضوحه.");
    }
  }
}

/* تحميل صورة */
function loadImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = URL.createObjectURL(file);
  });
}

/* قراءة QR من صورة باستخدام jsQR */
function scanQRFromImage(img) {
  const canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, canvas.width, canvas.height);

  return code ? code.data : null;
}

/* الكاميرا + jsQR (غير مرتبط بوضع المعرض لكن أضفنا L عند توليد QR فقط) */
let cameraStream = null;
let cameraRunning = false;

async function toggleCamera() {
  const video = document.getElementById("cameraView");

  if (cameraRunning) {
    cameraRunning = false;
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;
    }
    video.style.display = "none";
    return;
  }

  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = cameraStream;
    video.style.display = "block";
    cameraRunning = true;
    scanCameraLoop();
  } catch (e) {
    alert("تعذر تشغيل الكاميرا: " + e);
  }
}

function scanCameraLoop() {
  if (!cameraRunning) return;

  const video = document.getElementById("cameraView");
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height);

    if (code && code.data) {
      handleQRPayload(code.data);
    }
  }

  requestAnimationFrame(scanCameraLoop);
}
</script>

</body>
</html>
