<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام إرسال الصور عبر باركودات متعددة</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  margin: 0;
  padding: 0;
  color: #222;
}

header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}

button:hover {
  background: #0a8c6c;
}

textarea, input[type="file"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}

.qr-box {
  margin: 20px auto;
  text-align: center;
}

.qr-item {
  margin-bottom: 25px;
}

.small {
  font-size: 13px;
  color: #666;
  margin-top: 5px;
  text-align: center;
}
</style>

<!-- مكتبة توليد QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<!-- مكتبة قراءة QR من الصور -->
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<header>نظام إرسال الصور عبر باركودات متعددة</header>

<div class="container">

  <h3>1) إرسال صورة</h3>
  <input type="file" id="imageInput" accept="image/*">
  <button onclick="encodeImage()">تحويل الصورة إلى باركودات</button>
  <p class="small">سيتم توليد عدة باركودات حسب حجم الصورة. امسحها واحدًا تلو الآخر عند الاستقبال.</p>

  <div id="qrContainer" class="qr-box"></div>

  <hr>

  <h3>2) استقبال الصورة</h3>
  <p class="small">يمكنك مسح باركود من الكاميرا أو اختيار صورة باركود من المعرض. كرر العملية لكل جزء.</p>

  <button onclick="startScan()">مسح باركود بالكاميرا</button>
  <input type="file" id="qrImageInput" accept="image/*" style="margin-top:10px;">
  <button onclick="decodeFromQRImage()">فكّ باركود من صورة في المعرض</button>

  <div id="reader" style="width:300px; margin:15px auto; display:none;"></div>

  <h4>الأجزاء المستلمة:</h4>
  <div id="partsStatus" class="small"></div>

  <h4>الصورة المستعادة:</h4>
  <div id="outputImage" style="margin-top:20px; text-align:center;"></div>

</div>

<script>
/* =========================
   متغيرات عامة لتجميع الأجزاء
========================= */
let receivedParts = {};
let totalParts = 0;
let receivedMime = null;

/* =========================
   تحويل ملف إلى Base64 مع حفظ نوعه
========================= */
function fileToBase64WithMime(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result; // data:<mime>;base64,XXXX
      const [meta, data] = result.split(",");
      const mimeMatch = meta.match(/data:(.*);base64/);
      const mime = mimeMatch ? mimeMatch[1] : "image/png";
      resolve({ mime, data });
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* =========================
   توليد باركودات متعددة للصورة
========================= */
async function encodeImage() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) {
    alert("اختر صورة أولاً.");
    return;
  }

  const { mime, data: base64 } = await fileToBase64WithMime(file);

  // تقسيم Base64 إلى أجزاء
  const chunkSize = 800; // حجم مناسب لنص الباركود
  const chunks = [];
  for (let i = 0; i < base64.length; i += chunkSize) {
    chunks.push(base64.slice(i, i + chunkSize));
  }

  const qrContainer = document.getElementById("qrContainer");
  qrContainer.innerHTML = "";

  chunks.forEach((chunk, index) => {
    // IMG:current/total:mime|data
    const payload = `IMG:${index+1}/${chunks.length}:${mime}|${chunk}`;

    const div = document.createElement("div");
    div.className = "qr-item";

    const label = document.createElement("div");
    label.textContent = `الجزء ${index+1} من ${chunks.length}`;
    label.style.marginBottom = "8px";

    const qrDiv = document.createElement("div");

    new QRCode(qrDiv, {
      text: payload,
      width: 260,
      height: 260,
      correctLevel: QRCode.CorrectLevel.M
    });

    div.appendChild(label);
    div.appendChild(qrDiv);
    qrContainer.appendChild(div);
  });

  alert("تم توليد باركودات الصورة بنجاح.");
}

/* =========================
   معالجة نص باركود واحد مستلم
========================= */
function handleQRPayload(payload) {
  if (!payload.startsWith("IMG:")) {
    alert("هذا الباركود لا ينتمي للصورة الحالية.");
    return;
  }

  // IMG:current/total:mime|data
  const [header, body] = payload.split("|");
  const headerParts = header.replace("IMG:", "").split(":");
  const partInfo = headerParts[0]; // current/total
  const mime = headerParts[1] || "image/png";

  const [currentStr, totalStr] = partInfo.split("/");
  const current = parseInt(currentStr);
  const total = parseInt(totalStr);

  if (!totalParts) totalParts = total;
  if (!receivedMime) receivedMime = mime;

  receivedParts[current] = body;

  updatePartsStatus();

  if (Object.keys(receivedParts).length === totalParts) {
    rebuildImage();
  }
}

/* =========================
   تحديث حالة الأجزاء المستلمة
========================= */
function updatePartsStatus() {
  if (!totalParts) {
    document.getElementById("partsStatus").textContent = "لم يتم استقبال أي جزء بعد.";
    return;
  }

  const receivedCount = Object.keys(receivedParts).length;
  document.getElementById("partsStatus").textContent =
    `تم استقبال ${receivedCount} من ${totalParts} جزءًا.`;
}

/* =========================
   إعادة بناء الصورة من الأجزاء
========================= */
function rebuildImage() {
  let fullBase64 = "";
  for (let i = 1; i <= totalParts; i++) {
    if (!receivedParts[i]) {
      alert("هناك جزء مفقود، لا يمكن إعادة بناء الصورة.");
      return;
    }
    fullBase64 += receivedParts[i];
  }

  const img = new Image();
  img.src = `data:${receivedMime};base64,` + fullBase64;

  const out = document.getElementById("outputImage");
  out.innerHTML = "";
  out.appendChild(img);

  document.getElementById("partsStatus").textContent = "تم استعادة الصورة بنجاح.";

  // إعادة تهيئة المتغيرات لجلسة جديدة
  receivedParts = {};
  totalParts = 0;
  receivedMime = null;
}

/* =========================
   مسح باركود بالكاميرا
========================= */
let html5Qr = null;

function startScan() {
  const reader = document.getElementById("reader");
  reader.style.display = "block";

  if (html5Qr) {
    html5Qr.stop().catch(()=>{}).finally(()=> {
      html5Qr.clear();
      html5Qr = null;
      startScan();
    });
    return;
  }

  html5Qr = new Html5Qrcode("reader");

  html5Qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    qrText => {
      handleQRPayload(qrText);
      // لا نوقف المسح مباشرة، يمكن استقبال عدة أجزاء متتالية
    },
    errorMessage => {
      // يمكن تجاهل الأخطاء المؤقتة
    }
  ).catch(err => {
    alert("تعذر تشغيل الكاميرا: " + err);
  });
}

/* =========================
   فكّ باركود من صورة في المعرض
========================= */
async function decodeFromQRImage() {
  const file = document.getElementById("qrImageInput").files[0];
  if (!file) {
    alert("اختر صورة تحتوي على باركود أولاً.");
    return;
  }

  const tempId = "reader-temp";
  let tempDiv = document.getElementById(tempId);
  if (!tempDiv) {
    tempDiv = document.createElement("div");
    tempDiv.id = tempId;
    tempDiv.style.display = "none";
    document.body.appendChild(tempDiv);
  }

  const localQr = new Html5Qrcode(tempId);

  try {
    const result = await localQr.scanFile(file, true);
    handleQRPayload(result);
  } catch (e) {
    alert("فشل في قراءة الباركود من الصورة.");
  } finally {
    localQr.clear();
  }
}
</script>

</body>
</html>
